<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DriveNow Car Rental</title>

<!-- <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet"> -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:#f4f6f9;
  color:#333;
}

/* NAVBAR */
nav{
  background:#111827;
  padding:15px 40px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  color:white;
}

nav ul{
  display:flex;
  list-style:none;
  gap:25px;
}

nav a{
  color:white;
  text-decoration:none;
  font-weight:500;
  transition:0.3s;
}

nav a:hover{
  color:#00df9a;
}

/* HERO */
.hero{
  background:url('https://images.unsplash.com/photo-1503376780353-7e6692767b70') no-repeat center center/cover;
  height:90vh;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  text-align:center;
}

.hero h1{
  font-size:50px;
  margin-bottom:20px;
}

.hero button{
  padding:12px 25px;
  background:#00df9a;
  border:none;
  border-radius:8px;
  font-size:16px;
  cursor:pointer;
  font-weight:600;
}

/* SECTION */
.section{
  padding:60px 40px;
}

.car-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:25px;
}

.car-card{
  background:white;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
  transition:0.3s;
}

.car-card:hover{
  transform:translateY(-5px);
}

.car-card img{
  width:100%;
  height:200px;
  object-fit:cover;
}

.car-content{
  padding:20px;
}

.price{
  color:green;
  font-weight:bold;
  margin:10px 0;
}

/* MAP */
.map-container{
  width:100%;
  height:400px;
  border-radius:12px;
  overflow:hidden;
}

/* FOOTER */
footer{
  background:#111827;
  color:white;
  padding:40px;
  text-align:center;
}

footer .socials i{
  font-size:22px;
  margin:0 10px;
  cursor:pointer;
  transition:0.3s;
}

footer .socials i:hover{
  color:#00df9a;
}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  justify-content:center;
  align-items:center;
}

.modal-content{
  background:white;
  padding:30px;
  width:400px;
  border-radius:10px;
}

.modal-content input{
  width:100%;
  padding:8px;
  margin-bottom:15px;
  border-radius:6px;
  border:1px solid #ccc;
}

.modal-content button{
  width:100%;
  padding:10px;
  background:black;
  color:white;
  border:none;
  border-radius:6px;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav>
  <h2>Nanbar Car Travels</h2>
  <ul>
    <li><a href="#">Home</a></li>
    <li><a href="#cars">Cars</a></li>
    <li><a href="#location">Locations</a></li>
    <li><a href="#contact">Contact</a></li>
  </ul>
</nav>

<!-- HERO -->
<section class="hero">
  <div>
    <h1>Nanban Tours & Travels - Taxi Service in Vellore</h1>
    <button onclick="scrollToCars()">Explore Cars</button>
  </div>
</section>

<!-- CARS -->
<section class="section" id="cars">
  <h2 style="margin-bottom:20px;">Available Cars</h2>
  <div class="car-grid" id="carList">
  </div>
</section>

<!-- LOCATION & MAP -->
<section class="section" id="location">
  <h2 style="margin-bottom:20px;">Pickup & Drop Location</h2>

  <input type="text" id="pickupLocation" placeholder="Pickup Location" style="padding:10px;width:48%;margin-right:2%;">
  <input type="text" id="dropLocation" placeholder="Drop Location" style="padding:10px;width:48%;">

  <br><br>

  <!-- <div class="map-container">
    <iframe 
      src="https://maps.google.com/maps?q=Bangalore&t=&z=13&ie=UTF8&iwloc=&output=embed"
      width="100%" height="100%" frameborder="0" style="border:0;">
    </iframe>
  </div> -->
</section>

<!-- FOOTER -->
<footer id="contact">
  <h3>Nanban Tours & Travels - Taxi Service in Vellore</h3>

  <div class="socials">
    <i class="fab fa-instagram"></i>
    <i class="fab fa-facebook"></i>
    <i class="fab fa-twitter"></i>
    <i class="fab fa-linkedin"></i>
  </div>

  <p style="margin-top:20px;">© 2026 DriveNow. All Rights Reserved.</p>
</footer>

<!-- BOOKING MODAL -->
<div class="modal" id="bookingModal">
  <div class="modal-content">
    <h3>Book Car</h3>
    <input type="text" placeholder="Your Name">
    <input type="date">
    <input type="time">
    <input type="date">
    <button onclick="closeModal()">Confirm</button>
  </div>
</div>

<script>
const cars = [
  {id:1,name:"BMW X5",price:7000,image:"https://lh3.googleusercontent.com/p/AF1QipNbPJ4BUSsl2bsVnBzkrfTQGwHXgF_MNriaj4Z-=s1360-w1360-h1020-rw"},
  {id:2,name:"Audi A6",price:6500,image:"https://lh3.googleusercontent.com/p/AF1QipMBkyvSm5Kt2FwZcpC-yNlUe7L6HJ3PyAUcKZI1=w141-h176-n-k-no-nu"},
];

const carList = document.getElementById("carList");

cars.forEach(car=>{
  carList.innerHTML+=`
  <div class="car-card">
    <img src="${car.image}">
    <div class="car-content">
      <h3>${car.name}</h3>
      <p class="price">₹${car.price} / day</p>
      <button onclick="openModal()">Book Now</button>
    </div>
  </div>
  `;
});

function openModal(){
  document.getElementById("bookingModal").style.display="flex";
}

function closeModal(){
  document.getElementById("bookingModal").style.display="none";
}

function scrollToCars(){
  document.getElementById("cars").scrollIntoView({behavior:'smooth'});
}
</script>

</body>
</html>
